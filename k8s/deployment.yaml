apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudtestingapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudtestingapp
  template:
    metadata:
      labels:
        app: cloudtestingapp
    spec:
      containers:
      - name: cloudtestingapp
        image: cloudtestingapp:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: cloudtestingapp-config
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /api/orders
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/orders
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cloudtestingapp
spec:
  selector:
    app: cloudtestingapp
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
